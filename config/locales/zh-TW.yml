  about_page:
    title: "Aji 飲食紀錄的幕後故事"
    paragraph_1: "這個應用程式的靈感來自我的第一隻貓 Aji，一隻有著令人驚訝的特殊品味的橘白相間的毛球。與大多數橘貓不同，Aji 有自己獨特的偏好，經過多次嘗試和錯誤，才發現他對雞肉的喜愛遠勝於鮪魚或鮭魚。"
    paragraph_2: "起初，我用一個簡單的 Excel 表格來追蹤 Aji 的用餐情況，希望能找到一個模式。我很快就注意到，如果我給他一些他不喜歡的東西，他會完全跳過這餐，然後走開。"
    paragraph_3: "但是每天手動輸入 Excel 很繁瑣，而且很難將趨勢可視化。這就是我建立 Aji 飲食紀錄的原因：為了輕鬆地將飲食趨勢可視化，並整理 Aji 最喜歡的食物，確保他每天都吃得飽飽的，開開心心的。"
    paragraph_4: "✨ 準備好試試了嗎？註冊並親自體驗一下。"
    paragraph_5: "如果您有興趣了解更多關於貓的飲食習慣，我強烈建議您諮詢專業人士。我個人從中獲得了極大的啟發"
    pet_buddy_link: "貼心毛寶 - 貓行為諮商與訓練"
