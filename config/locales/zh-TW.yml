zh-TW:
  hero_section:
    heading: "視覺化寵物餵食追蹤應用程序 🐾"
    subheading: "擁有清晰可視化的界面，用於追蹤您的貓科動物的飲食喜好、趨勢。協助飼主將雜亂無章的Excel資料轉換成圖表。"
    features_title: "功能"
    features_subtitle: "主要目的是讓飼主輕鬆探索他們的貓科動物的喜好，並迅速注意到牠們的身體警訊。"
    tab_1: "簡單的寵物管理 😼"
    tab_2: "飲食紀錄監控 📊"
    tab_3: "乾糧庫存管理 🔎"
    panel_1_title: "簡單的寵物管理"
    panel_1_content: "詳細的寵物資料及相關飲食記錄。一個飼主可記錄多個寵物的資料。"
    panel_2_title: "圖表視覺化"
    panel_2_content: "簡化您的寵物的日常餵食。我們利用簡單的紀錄界面幫助飼主密切關注寵物的飲食趨勢。"
    panel_3_title: "乾糧庫存管理"
    panel_3_content: "在飼主輸入每日飲食記錄時，當乾糧剩下三分之一時，提醒飼主補貨。"
  doc_page:
    title: "寵物飲食紀錄使用指南"
    description: "本指南提供有關如何使用寵物飲食紀錄主要功能的詳細說明。"
    user_account_title: "使用者帳戶"
    user_account_description: "您的使用者帳戶是管理您的寵物和追蹤其飲食的中心樞紐。"
    creating_account_title: "建立帳戶"
    creating_account_step_1: "註冊：導覽至「開始使用」頁面。"
    creating_account_step_2: "有四種方式可以建立帳戶："
    creating_account_step_2a: "輸入您的詳細資料（應用程式的表單）：提供您的電子郵件地址和安全的密碼。"
    creating_account_step_2b: "Google/GitHub：使用 Google 或 GitHub 建立帳戶。"
    creating_account_step_2c: "Line：使用 Line 建立帳戶。"
    creating_account_step_2d: "使用 Line 註冊，頁面將重新導向至填寫電子郵件和密碼的表單。"
    creating_account_step_3: "註冊：按一下「註冊」按鈕以建立您的帳戶。"
    signing_in_title: "登入"
    signing_in_step_1: "登入：前往「登入」頁面。"
    signing_in_step_2: "輸入您的憑證：輸入您的電子郵件和密碼。"
    signing_in_step_3: "存取您的帳戶：按一下「登入」按鈕以存取您的儀表板。"
    third_party_signin_title: "第三方登入"
    third_party_signin_description: "您也可以使用第三方提供者登入，以獲得更流暢的體驗。"
    timezone_title: "時區"
    timezone_description: "應用程式會在您的帳戶設定期間自動設定您的當地時區，以確保所有飲食紀錄都是準確的。"
    pet_management_title: "寵物管理"
    pet_management_description: "「寵物」區段可讓您為每隻寵物建立和管理個人資料。"
    adding_pet_title: "新增寵物"
    adding_pet_step_1: "前往寵物：從主選單導覽至「使用者的貓」區段。"
    adding_pet_step_2: "新增寵物：按一下「新增寵物」按鈕。"
    adding_pet_step_3: "輸入寵物詳細資料：填寫您寵物的姓名、物種和其他相關資訊。"
    adding_pet_step_4: "儲存：按一下「新增貓」以儲存個人資料。"
    viewing_editing_pets_title: 顯示和編輯寵物"
    viewing_editing_pets_description: "從主選單導覽至「使用者的貓」區段。下拉式選單會顯示所有寵物的姓名。按一下寵物的姓名以查看其詳細的個人資料。"
    viewing_editing_pets_step_1: "編輯：從寵物的個人資料頁面，按一下「編輯寵物姓名個人資料」以更新其資訊。"
    dry_food_storage_title: "乾糧儲存"
    dry_food_storage_description: "「乾糧儲存」功能可協助您追蹤寵物的乾糧庫存。"
    adding_dry_food_title: "新增乾糧"
    adding_dry_food_step_1: "前往乾糧：導覽至「乾糧儲存」區段。"
    adding_dry_food_step_2: "新乾糧：按一下下拉式選單中的「新增乾糧」。"
    adding_dry_food_step_3: "輸入食物詳細資料：提供乾糧的品牌、食物類型、說明/品牌和數量。"
    adding_dry_food_step_4: "儲存：按一下「新增乾糧」以將其新增至您的庫存。"
    managing_inventory_title: "管理庫存"
    managing_inventory_step_1: "顯示：顯示所有乾糧及其目前數量的清單。"
    managing_inventory_step_2: "刪除：從您的庫存中移除乾糧項目。"
    trackers_title: "飲食紀錄"
    trackers_description: "飲食紀錄用於記錄您寵物的每日飲食，例如餵食時間、份量和健康觀察。"
    creating_tracker_title: "建立飲食紀錄"
    creating_tracker_step_1: "前往飲食紀錄：導覽至「飲食紀錄」區段。"
    creating_tracker_step_2: "新增飲食紀錄：在寵物姓名的飲食紀錄頁面，按一下「為寵物姓名新增飲食紀錄」按鈕。"
    creating_tracker_step_3: "選取寵物：在下拉式選單中選擇「寵物姓名的飲食紀錄」。"
    creating_tracker_step_4: "輸入詳細資料：填寫飲食詳細資料，例如食物類型、餵食時間和任何注意事項。"
    creating_tracker_step_5: "儲存：按一下「為寵物姓名新增記錄」以記錄您要建立的飲食資訊。"
    importing_trackers_title: "從 CSV 上傳飲食紀錄"
    importing_trackers_description: "對於大量資料輸入，您可以從 CSV 檔案上傳飲食紀錄。"
    importing_trackers_step_1: "前往飲食紀錄：導覽至「飲食紀錄」部分。"
    importing_trackers_step_2: "上傳 CSV：按一下「選擇檔案」按鈕。"
