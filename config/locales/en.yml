    hungry_options_title: "🥣 'Hungry' Column Options"
    hungry_options_description: "Please use one of these exact phrases (including the symbols) for the hungry column:"
    hungry_option_1: "💖 Yes, eat right away"
    hungry_option_2: "❌ No, not interested"
